openapi: 3.0.3
info:
  title: WildLog API - Post Bookmarks
  version: 1.0.0
  description: >
    Endpoints for managing post bookmarks.
    Requires authenticated session (PHPSESSID cookie).

servers:
  - url: https://wild-log.com/backend/api
    description: Production
  - url: http://localhost:8000/api
    description: Local

tags:
  - name: Bookmarks
    description: Post bookmark management

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: PHPSESSID

  schemas:
    BookmarkResponse:
      type: object
      properties:
        user_id:
          type: integer
          example: 6
        post_id:
          type: integer
          example: 14

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: BAD_REQUEST
        message:
          type: string
          example: Invalid request
        request_id:
          type: string
          example: abc123

paths:
  /post/bookmark/save_post.php:
    post:
      tags:
        - Bookmarks
      summary: Bookmark a post
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - post_id
              properties:
                post_id:
                  type: integer
                  example: 14
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - post_id
              properties:
                post_id:
                  type: integer
                  example: 14
      responses:
        '200':
          description: Post bookmarked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: boolean
                    example: true
                  user_id:
                    type: integer
                    example: 6
                  post_id:
                    type: integer
                    example: 14
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Post not found or not public
        '409':
          description: Post already bookmarked
        '500':
          description: Internal server error

  /post/bookmark/unsave_post.php:
    delete:
      tags:
        - Bookmarks
      summary: Remove bookmark from a post
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - post_id
              properties:
                post_id:
                  type: integer
                  example: 14
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - post_id
              properties:
                post_id:
                  type: integer
                  example: 14
      responses:
        '200':
          description: Bookmark removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
                  user_id:
                    type: integer
                    example: 6
                  post_id:
                    type: integer
                    example: 14
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Bookmark not found or post not public
        '500':
          description: Internal server error