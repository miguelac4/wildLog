openapi: 3.0.3
info:
  title: WildLog API - Account
  version: 1.0.0
  description: >
    Account management endpoints for WildLog.

servers:
  - url: https://wild-log.com/backend/api
  - url: http://localhost:8000/api

tags:
  - name: Account
    description: Authenticated user account management

components:

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: PHPSESSID

  schemas:

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
      required:
        - code
        - message

    Account:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
          example: wild_user
        name:
          type: string
        email:
          type: string
          format: email
        description:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
          example: /backend/upload/user/avatar/12/avatar.png
        created_at:
          type: string
          format: date-time
      required:
        - id
        - username
        - name
        - email
        - created_at

    AccountResponse:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/Account'

    AccountInfoUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
        description:
          type: string
          nullable: true
          maxLength: 255
      required:
        - name

    AccountInfoUpdateResponse:
      type: object
      properties:
        account:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            description:
              type: string
              nullable: true

    AvatarUpdateResponse:
      type: object
      properties:
        account:
          type: object
          properties:
            id:
              type: integer
            avatar:
              type: string
              example: /backend/upload/user/avatar/12/avatar.png

    ChangePasswordRequest:
      type: object
      properties:
        curr_password:
          type: string
        new_password:
          type: string
          minLength: 8
        confirm_password:
          type: string
      required:
        - curr_password
        - new_password
        - confirm_password

    DeleteAccountRequest:
      type: object
      properties:
        password:
          type: string
        confirm_text:
          type: string
          example: DELETE
      required:
        - password
        - confirm_text

    MessageResponse:
      type: object
      properties:
        message:
          type: string

  responses:

    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    MethodNotAllowed:
      description: Method not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalError:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

security:
  - sessionCookie: []

paths:

  /account/get_account.php:
    get:
      tags:
        - Account
      summary: Get account
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /account/edit_account_info.php:
    post:
      tags:
        - Account
      summary: Edit account info
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountInfoUpdateRequest'
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountInfoUpdateResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /account/edit_avatar.php:
    post:
      tags:
        - Account
      summary: Update avatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUpdateResponse'

  /account/change_password.php:
    post:
      tags:
        - Account
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /account/delete_account.php:
    delete:
      tags:
        - Account
      summary: Delete account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /account/get_bookmark.php:
    get:
      tags:
        - Account
      summary: Get user bookmarked posts
      description: >
        Returns a list of post IDs bookmarked by the authenticated user.
      responses:
        "200":
          description: List of bookmarked posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookmarks:
                    type: array
                    items:
                      type: object
                      properties:
                        post_id:
                          type: integer
                          example: 14
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalError'