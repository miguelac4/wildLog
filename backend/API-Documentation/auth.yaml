openapi: 3.0.3
info:
  title: WildLog API - Auth
  version: 1.1.0
  description: Authentication endpoints for WildLog

servers:
  - url: https://wild-log.com/backend/api
  - url: http://localhost:8000/api

tags:
  - name: Auth
    description: Authentication and account access

components:

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: PHPSESSID

  schemas:

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
      required: [code, message]

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
          example: miguel123
        email:
          type: string
          format: email
        role:
          type: string
          enum: [base, vip]
      required: [id, username, email, role]

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 2
          maxLength: 80
          example: miguel123
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required: [username, email, password]

    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"

    LogoutResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    VerificationMailRequest:
      type: object
      properties:
        email:
          type: string
      required: [email]

    GenericSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    VerifyAccountResponse:
      type: object
      properties:
        success:
          type: boolean
        status:
          type: string
          enum: [verified, already_verified]
        message:
          type: string

    PassRecoverResetRequest:
      type: object
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8
        confirm_password:
          type: string
          minLength: 8
      required: [token, new_password, confirm_password]

paths:

  /auth/me.php:
    get:
      tags: [Auth]
      summary: Get current user
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register.php:
    post:
      tags: [Auth]
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email or username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login.php:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
        "403":
          description: Email not verified

  /auth/logout.php:
    post:
      tags: [Auth]
      summary: Logout
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /auth/verification_mail.php:
    post:
      tags: [Auth]
      summary: Send verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationMailRequest"
      responses:
        "200":
          description: Neutral response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccessResponse"
        "429":
          description: Rate limit exceeded

  /auth/verify_account.php:
    get:
      tags: [Auth]
      summary: Verify account
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyAccountResponse"
        "400":
          description: Invalid or expired token

  /auth/pass_recover_request.php:
    post:
      tags: [Auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationMailRequest"
      responses:
        "200":
          description: Neutral response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccessResponse"
        "429":
          description: Too many requests

  /auth/pass_recover_confirm.php:
    get:
      tags: [Auth]
      summary: Validate reset token (redirect)
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to frontend

  /auth/pass_recover_reset.php:
    post:
      tags: [Auth]
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassRecoverResetRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccessResponse"
        "401":
          description: Invalid token